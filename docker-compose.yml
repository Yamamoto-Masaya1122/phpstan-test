services:
  app:
    container_name: phpstan-test-php
    build: ./docker/php
    volumes:
      - .:/var/www/
    ports:
      - 5173:5173
    depends_on:
      - mysql

  apache:
    container_name: phpstan-test-apache
    build: ./docker/apache
    ports:
      - 80:80
    volumes:
      - .:/var/www/
    depends_on:
      - app

  mysql:
    container_name: phpstan-test-mysql
    image: mysql:8.4
    ports:
      - 3306:3306
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    volumes:
      - mysql-volume:/var/lib/mysql

  phpmyadmin:
    container_name: phpstan-test-phpmyadmin
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - 8081:80
    depends_on:
      - mysql

volumes:
  mysql-volume: